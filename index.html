<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POD GOD — Podcast Tools</title>
  <meta name="description" content="POD GOD — podcast player and editor. Coming soon.">
  <meta property="og:title" content="POD GOD">
  <meta property="og:description" content="Podcast player and editor. Coming soon.">
  <meta property="og:image" content="https://podgod.ca/img.png">
  <meta property="og:url" content="https://podgod.ca">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ff4d8d'/%3E%3Cstop offset='50%25' stop-color='%23c850f2'/%3E%3Cstop offset='100%25' stop-color='%236c63ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='url(%23g)'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0e17;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 50, 100, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(50, 120, 255, 0.06) 0%, transparent 50%);
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      width: 100%;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .logo {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #ff4d8d, #c850f2, #6c63ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 0.8s ease-out both;
    }

    .tagline {
      font-size: 1.25rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 2.5rem;
      animation: fadeInUp 0.8s ease-out 0.15s both;
    }

    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .product-card:hover {
      border-color: rgba(200, 80, 242, 0.2);
      box-shadow: 0 0 40px rgba(120, 40, 200, 0.08);
    }

    .product-image {
      width: 100%;
      height: 240px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image img {
      max-width: 100%;
      max-height: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .player-image img {
      width: 240px;
      height: 240px;
    }

    .editor-image {
      border-radius: 8px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06),
        0 12px 40px -8px rgba(0, 0, 0, 0.5);
    }

    .product-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 0.3rem;
    }

    .product-platforms {
      font-size: 0.85rem;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 1rem;
    }

    .product-desc {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 1.2rem;
    }

    .coming-soon {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #0b0e17;
      background: linear-gradient(135deg, #ff4d8d, #c850f2);
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      margin-top: auto;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .logo {
        font-size: 3rem;
      }
      .tagline {
        font-size: 1.05rem;
      }
      .container {
        padding: 2rem 1rem;
      }
      .products {
        grid-template-columns: 1fr;
      }
      .player-image img {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="logo">POD GOD</h1>
    <p class="tagline">The best podcast player and editor out there.</p>

    <div class="products">
      <div class="product-card">
        <div class="product-image player-image">
          <img src="player-icon.png" alt="POD GOD Player" width="240" height="240">
        </div>
        <div class="product-name">Player</div>
        <div class="product-platforms">iOS &amp; Android</div>
        <p class="product-desc">Simple, fast, ad-free. No account needed.</p>
        <span class="coming-soon">Coming Soon</span>
      </div>

      <div class="product-card">
        <div class="product-image editor-image">
          <img src="img.png" alt="POD GOD Editor — podcast editor interface" width="1024" height="530">
        </div>
        <div class="product-name">Editor</div>
        <div class="product-platforms">Browser based?</div>
        <p class="product-desc">Professional quality with the click of a button.</p>
        <span class="coming-soon">Coming Soon</span>
      </div>
    </div>
  </main>
</body>
</html>
